name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (Biome)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v6

      - name: Installation de Bun
        uses: oven-sh/setup-bun@v2

      - name: Installation des dépendances
        run: bun install

      - name: Vérification du lint
        run: bun run lint:ci

  test:
    name: Tests & Couverture
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout du code
        uses: actions/checkout@v6

      - name: Installation de Bun
        uses: oven-sh/setup-bun@v2

      - name: Installation des dépendances
        run: bun install

      - name: Exécution des tests avec couverture (seuil 80%)
        run: bun run test:coverage

  verify:
    name: Vérification finale
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Pipeline validé
        run: echo "✅ Pipeline CI réussi — lint, tests et couverture validés"
